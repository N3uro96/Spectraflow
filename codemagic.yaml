workflows:
  android-workflow:
    name: Android Debug Build
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Build Android APK
        script: |
          cd app
          flutter build apk --debug --no-tree-shake-icons
    artifacts:
      - app/build/app/outputs/flutter-apk/app-debug.apk
