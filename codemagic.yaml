workflows:
  android-workflow:
    name: Android Build
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      java: 17
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Build Android APK
        script: |
          cd app
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - app/build/app/outputs/flutter-apk/app-release.apk

  ios-workflow:
    name: iOS Build
    max_build_duration: 60
    environment:
      flutter: 3.44.2
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: |
          cd app
          flutter pub get
      - name: Build iOS
        script: |
          cd app
          flutter build ios --release --no-codesign
    artifacts:
      - app/build/ios/iphoneos/Runner.app
